---
- name: Setup ComfyUI Server for FLUX.1
  hosts: DarkBase
  become: yes

  # Override model settings here if needed:
  vars:
    # Use 'schnell' (faster, no token required) or 'dev'    # Variables for ComfyUI container
    flux_model_version: 'gaia' # Options: 'dev', 'schnell', 'ablit_v2', 'gaia'
    # Set flux_hf_token in inventory/group_vars/all.yml (gitignored)
    # flux_hf_token: "your-huggingface-token-here"

  roles:
    - role: comfyui
